<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MilesToGo Club Tracker - Live Data</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #fc5200;
            --primary-dark: #d64400;
            --secondary: #00d4ff;
            --dark: #0a0e27;
            --dark-elevated: #1a1f3a;
            --dark-card: #252a45;
            --text: #ffffff;
            --text-secondary: #a0a5c0;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff3366;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
        }

        .app {
            min-height: 100vh;
            background: 
                radial-gradient(ellipse at top right, rgba(252, 82, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom left, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                var(--dark);
        }

        .header {
            background: linear-gradient(135deg, var(--dark-elevated) 0%, var(--dark-card) 100%);
            padding: 2rem 0;
            border-bottom: 2px solid rgba(252, 82, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% 100%;
            animation: gradientShift 3s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            letter-spacing: 0.1em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            animation: fadeInDown 0.6s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 2px solid var(--text-secondary);
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .nav-btn:hover::before {
            left: 100%;
        }

        .nav-btn.active {
            border-color: var(--primary);
            background: rgba(252, 82, 0, 0.1);
            color: var(--primary);
        }

        .nav-btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(252, 82, 0, 0.3);
        }

        .main {
            padding: 3rem 0;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .setup-banner {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            text-align: center;
        }

        .setup-banner h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .setup-banner p {
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .athlete-input {
            display: flex;
            gap: 1rem;
            max-width: 600px;
            margin: 1rem auto 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .athlete-input input {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            border-radius: 6px;
            font-size: 1rem;
        }

        .athlete-input input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .athlete-input input:focus {
            outline: none;
            border-color: var(--text);
            background: rgba(255, 255, 255, 0.15);
        }

        .loading {
            text-align: center;
            padding: 4rem 2rem;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(252, 82, 0, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-banner {
            background: rgba(255, 51, 102, 0.1);
            border: 2px solid var(--danger);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 2rem;
        }

        .error-banner h3 {
            color: var(--danger);
            margin-bottom: 0.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--dark-card);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            animation: slideUp 0.6s ease backwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            border-color: rgba(252, 82, 0, 0.3);
        }

        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 3rem;
            line-height: 1;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        .stat-subtext {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .section {
            background: var(--dark-card);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2rem;
            letter-spacing: 0.05em;
            color: var(--text);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: var(--text);
            font-family: 'Work Sans', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(252, 82, 0, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .activities-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .activity-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: var(--dark-elevated);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .activity-item:hover {
            background: rgba(252, 82, 0, 0.1);
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .activity-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .activity-info h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .activity-details {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .activity-stats {
            text-align: right;
        }

        .activity-distance {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--primary);
        }

        .activity-date {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.2rem;
            background: var(--dark-elevated);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            font-family: 'Work Sans', sans-serif;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: var(--primary);
            color: var(--text);
            border-color: var(--primary);
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            .stat-value {
                font-size: 2rem;
            }

            .activity-item {
                grid-template-columns: auto 1fr;
            }

            .activity-stats {
                grid-column: 2;
                text-align: left;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE_URL = 'http://localhost:3000';

        const App = () => {
            const [activeView, setActiveView] = useState('activities');
            const [athleteId, setAthleteId] = useState('');
            const [inputAthleteId, setInputAthleteId] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const [athleteData, setAthleteData] = useState(null);
            const [activities, setActivities] = useState([]);
            const [stats, setStats] = useState(null);
            const [timeFilter, setTimeFilter] = useState('all');

            // Load athlete ID from URL or localStorage
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const urlAthleteId = urlParams.get('athlete_id');
                const savedAthleteId = localStorage.getItem('athleteId');

                if (urlAthleteId) {
                    setAthleteId(urlAthleteId);
                    localStorage.setItem('athleteId', urlAthleteId);
                } else if (savedAthleteId) {
                    setAthleteId(savedAthleteId);
                }
            }, []);

            // Fetch data when athlete ID is set
            useEffect(() => {
                if (athleteId) {
                    fetchAllData();
                }
            }, [athleteId]);

            const fetchAllData = async () => {
                setLoading(true);
                setError(null);

                try {
                    // Fetch athlete profile
                    const profileRes = await fetch(`${API_BASE_URL}/api/athlete/${athleteId}`);
                    if (!profileRes.ok) throw new Error('Failed to fetch athlete profile');
                    const profile = await profileRes.json();
                    setAthleteData(profile);

                    // Fetch activities
                    const activitiesRes = await fetch(`${API_BASE_URL}/api/activities/${athleteId}?per_page=50`);
                    if (!activitiesRes.ok) throw new Error('Failed to fetch activities');
                    const activitiesData = await activitiesRes.json();
                    setActivities(activitiesData);

                    // Fetch stats
                    const statsRes = await fetch(`${API_BASE_URL}/api/stats/${athleteId}`);
                    if (!statsRes.ok) throw new Error('Failed to fetch stats');
                    const statsData = await statsRes.json();
                    setStats(statsData);

                } catch (err) {
                    console.error('Error fetching data:', err);
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            const handleSetAthleteId = () => {
                if (inputAthleteId.trim()) {
                    setAthleteId(inputAthleteId.trim());
                    localStorage.setItem('athleteId', inputAthleteId.trim());
                    setInputAthleteId('');
                }
            };

            const handleKeyPress = (e) => {
                if (e.key === 'Enter') {
                    handleSetAthleteId();
                }
            };

            const getActivityIcon = (type) => {
                const icons = {
                    'Run': '🏃',
                    'Ride': '🚴',
                    'Swim': '🏊',
                    'Walk': '🚶',
                    'Hike': '🥾',
                    'VirtualRide': '🚴',
                    'VirtualRun': '🏃',
                };
                return icons[type] || '💪';
            };

            const formatDistance = (meters) => {
                return (meters / 1000).toFixed(2);
            };

            const formatDate = (dateString) => {
                const date = new Date(dateString);
                const now = new Date();
                const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));

                if (diffDays === 0) return 'Today';
                if (diffDays === 1) return 'Yesterday';
                if (diffDays < 7) return `${diffDays} days ago`;
                return date.toLocaleDateString();
            };

            const formatDuration = (seconds) => {
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                if (hours > 0) return `${hours}h ${minutes}m`;
                return `${minutes}m`;
            };

            const getFilteredActivities = () => {
                const now = new Date();
                return activities.filter(activity => {
                    const activityDate = new Date(activity.start_date);
                    
                    switch (timeFilter) {
                        case 'week':
                            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                            return activityDate >= weekAgo;
                        case 'month':
                            const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                            return activityDate >= monthAgo;
                        case 'year':
                            return activityDate.getFullYear() === now.getFullYear();
                        default:
                            return true;
                    }
                });
            };

            const calculateTotals = () => {
                const filtered = getFilteredActivities();
                return {
                    distance: filtered.reduce((sum, a) => sum + a.distance, 0),
                    activities: filtered.length,
                    elevation: filtered.reduce((sum, a) => sum + a.total_elevation_gain, 0),
                    time: filtered.reduce((sum, a) => sum + a.moving_time, 0)
                };
            };

            const exportToCSV = () => {
                const filtered = getFilteredActivities();
                const headers = ['Date', 'Activity', 'Type', 'Distance (km)', 'Elevation (m)', 'Time', 'Avg Speed (km/h)'];
                const rows = filtered.map(activity => [
                    new Date(activity.start_date).toLocaleDateString(),
                    activity.name,
                    activity.type,
                    formatDistance(activity.distance),
                    activity.total_elevation_gain,
                    formatDuration(activity.moving_time),
                    ((activity.distance / 1000) / (activity.moving_time / 3600)).toFixed(2)
                ]);

                const csv = [headers, ...rows].map(row => row.join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `strava-activities-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
            };

            if (!athleteId) {
                return (
                    <div className="app">
                        <header className="header">
                            <div className="container">
                                <div className="header-content">
                                    <div className="logo">Club Tracker</div>
                                </div>
                            </div>
                        </header>
                        <main className="main">
                            <div className="container">
                                <div className="setup-banner">
                                    <h2>Welcome to MilesToGo Club Tracker</h2>
                                    <p>Enter your Athlete ID to view your activities and stats</p>
                                    <p style={{ fontSize: '0.9rem', opacity: 0.8 }}>
                                        Don't have your Athlete ID? <a href={`${API_BASE_URL}/auth/strava`} style={{ color: 'white', textDecoration: 'underline' }}>Authenticate with Strava</a>
                                    </p>
                                    <div className="athlete-input">
                                        <input
                                            type="text"
                                            placeholder="Enter Athlete ID (e.g., 12345678)"
                                            value={inputAthleteId}
                                            onChange={(e) => setInputAthleteId(e.target.value)}
                                            onKeyPress={handleKeyPress}
                                        />
                                        <button className="btn" onClick={handleSetAthleteId}>
                                            Load Data
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            if (loading && !athleteData) {
                return (
                    <div className="app">
                        <div className="loading">
                            <div className="spinner"></div>
                            <h2>Loading your Activity data...</h2>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="app">
                        <header className="header">
                            <div className="container">
                                <div className="header-content">
                                    <div className="logo">Club Tracker</div>
                                </div>
                            </div>
                        </header>
                        <main className="main">
                            <div className="container">
                                <div className="error-banner">
                                    <h3>Error Loading Data</h3>
                                    <p>{error}</p>
                                    <p style={{ marginTop: '1rem' }}>
                                        Make sure:
                                        <ul style={{ marginLeft: '1.5rem', marginTop: '0.5rem' }}>
                                            <li>Your server is running (npm start)</li>
                                            <li>You've authenticated at <a href={`${API_BASE_URL}/auth/strava`} style={{ color: 'var(--primary)' }}>localhost:3000/auth/strava</a></li>
                                            <li>Your Athlete ID is correct</li>
                                        </ul>
                                    </p>
                                    <button 
                                        className="btn" 
                                        style={{ marginTop: '1rem' }}
                                        onClick={() => {
                                            setAthleteId('');
                                            localStorage.removeItem('athleteId');
                                        }}
                                    >
                                        Try Different ID
                                    </button>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            const totals = calculateTotals();

            return (
                <div className="app">
                    <header className="header">
                        <div className="container">
                            <div className="header-content">
                                <div className="logo">Club Tracker</div>
                                <nav className="nav">
                                    <button 
                                        className={`nav-btn ${activeView === 'activities' ? 'active' : ''}`}
                                        onClick={() => setActiveView('activities')}
                                    >
                                        Activities
                                    </button>
                                    <button 
                                        className={`nav-btn ${activeView === 'stats' ? 'active' : ''}`}
                                        onClick={() => setActiveView('stats')}
                                    >
                                        Stats
                                    </button>
                                    <button 
                                        className="nav-btn"
                                        onClick={() => {
                                            setAthleteId('');
                                            localStorage.removeItem('athleteId');
                                        }}
                                    >
                                        Change Athlete
                                    </button>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <main className="main">
                        <div className="container">
                            {athleteData && (
                                <div style={{ marginBottom: '2rem', textAlign: 'center' }}>
                                    <h2 style={{ fontSize: '1.5rem', marginBottom: '0.5rem' }}>
                                        Welcome, {athleteData.firstname} {athleteData.lastname}!
                                    </h2>
                                    <p style={{ color: 'var(--text-secondary)' }}>
                                        @{athleteData.username} • {athleteData.city}, {athleteData.state}
                                    </p>
                                </div>
                            )}

                            <div className="stats-grid">
                                <div className="stat-card">
                                    <div className="stat-label">Total Distance</div>
                                    <div className="stat-value">{formatDistance(totals.distance)}</div>
                                    <div className="stat-subtext">kilometers</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Total Activities</div>
                                    <div className="stat-value">{totals.activities}</div>
                                    <div className="stat-subtext">completed</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Total Elevation</div>
                                    <div className="stat-value">{Math.round(totals.elevation).toLocaleString()}</div>
                                    <div className="stat-subtext">meters gained</div>
                                </div>
                                <div className="stat-card">
                                    <div className="stat-label">Total Time</div>
                                    <div className="stat-value">{Math.round(totals.time / 3600)}</div>
                                    <div className="stat-subtext">hours moving</div>
                                </div>
                            </div>

                            {activeView === 'activities' && (
                                <div className="section">
                                    <div className="section-header">
                                        <h2 className="section-title">Recent Activities</h2>
                                        <button className="btn" onClick={exportToCSV}>
                                            Export CSV
                                        </button>
                                    </div>

                                    <div className="filter-bar">
                                        <button 
                                            className={`filter-btn ${timeFilter === 'all' ? 'active' : ''}`}
                                            onClick={() => setTimeFilter('all')}
                                        >
                                            All Time
                                        </button>
                                        <button 
                                            className={`filter-btn ${timeFilter === 'week' ? 'active' : ''}`}
                                            onClick={() => setTimeFilter('week')}
                                        >
                                            This Week
                                        </button>
                                        <button 
                                            className={`filter-btn ${timeFilter === 'month' ? 'active' : ''}`}
                                            onClick={() => setTimeFilter('month')}
                                        >
                                            This Month
                                        </button>
                                        <button 
                                            className={`filter-btn ${timeFilter === 'year' ? 'active' : ''}`}
                                            onClick={() => setTimeFilter('year')}
                                        >
                                            This Year
                                        </button>
                                    </div>

                                    <div className="activities-list">
                                        {getFilteredActivities().slice(0, 20).map((activity) => (
                                            <div key={activity.id} className="activity-item">
                                                <div className="activity-icon">
                                                    {getActivityIcon(activity.type)}
                                                </div>
                                                <div className="activity-info">
                                                    <h3>{activity.name}</h3>
                                                    <div className="activity-details">
                                                        {activity.type} • {formatDuration(activity.moving_time)} • {Math.round(activity.total_elevation_gain)}m elevation
                                                    </div>
                                                </div>
                                                <div className="activity-stats">
                                                    <div className="activity-distance">{formatDistance(activity.distance)} km</div>
                                                    <div className="activity-date">{formatDate(activity.start_date)}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {getFilteredActivities().length === 0 && (
                                        <div style={{ textAlign: 'center', padding: '3rem', color: 'var(--text-secondary)' }}>
                                            <p>No activities found for this time period.</p>
                                        </div>
                                    )}
                                </div>
                            )}

                            {activeView === 'stats' && stats && (
                                <div className="section">
                                    <div className="section-header">
                                        <h2 className="section-title">Your Stats</h2>
                                    </div>

                                    {stats.ytd_run_totals && (
                                        <div style={{ marginBottom: '2rem' }}>
                                            <h3 style={{ fontSize: '1.5rem', marginBottom: '1rem', color: 'var(--primary)' }}>
                                                Running - Year to Date
                                            </h3>
                                            <div className="stats-grid">
                                                <div className="stat-card">
                                                    <div className="stat-label">Distance</div>
                                                    <div className="stat-value">{formatDistance(stats.ytd_run_totals.distance)}</div>
                                                    <div className="stat-subtext">km</div>
                                                </div>
                                                <div className="stat-card">
                                                    <div className="stat-label">Activities</div>
                                                    <div className="stat-value">{stats.ytd_run_totals.count}</div>
                                                    <div className="stat-subtext">runs</div>
                                                </div>
                                                <div className="stat-card">
                                                    <div className="stat-label">Elevation</div>
                                                    <div className="stat-value">{Math.round(stats.ytd_run_totals.elevation_gain)}</div>
                                                    <div className="stat-subtext">meters</div>
                                                </div>
                                                <div className="stat-card">
                                                    <div className="stat-label">Time</div>
                                                    <div className="stat-value">{Math.round(stats.ytd_run_totals.moving_time / 3600)}</div>
                                                    <div className="stat-subtext">hours</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {stats.ytd_ride_totals && (
                                        <div>
                                            <h3 style={{ fontSize: '1.5rem', marginBottom: '1rem', color: 'var(--secondary)' }}>
                                                Cycling - Year to Date
                                            </h3>
                                            <div className="stats-grid">
                                                <div className="stat-card">
                                                    <div className="stat-label">Distance</div>
                                                    <div className="stat-value">{formatDistance(stats.ytd_ride_totals.distance)}</div>
                                                    <div className="stat-subtext">km</div>
                                                </div>
                                                <div className="stat-card">
                                                    <div className="stat-label">Activities</div>
                                                    <div className="stat-value">{stats.ytd_ride_totals.count}</div>
                                                    <div className="stat-subtext">rides</div>
                                                </div>
                                                <div className="stat-card">
                                                    <div className="stat-label">Elevation</div>
                                                    <div className="stat-value">{Math.round(stats.ytd_ride_totals.elevation_gain)}</div>
                                                    <div className="stat-subtext">meters</div>
                                                </div>
                                                <div className="stat-card">
                                                    <div className="stat-label">Time</div>
                                                    <div className="stat-value">{Math.round(stats.ytd_ride_totals.moving_time / 3600)}</div>
                                                    <div className="stat-subtext">hours</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
